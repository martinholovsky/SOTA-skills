name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  invariants:
    name: Repository invariants
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.0, pinned by commit SHA (sota-devsecops).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # The build steps run repo scripts and never push.
          persist-credentials: false
          # Invariant 5 compares VERSION against the newest v* tag; a shallow
          # tagless checkout would silently skip that comparison.
          fetch-depth: 0
          fetch-tags: true
      - name: Require denylist secret on trusted runs
        # check 3 silently degrades to generic-only if SOTA_DENYLIST is absent.
        # That fallback is correct for fork PRs (which don't receive secrets)
        # but on push-to-main and same-repo PRs a missing secret means the
        # authoritative scan isn't running — fail loudly instead (2026-07-10
        # audit S-MED-1).
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          SOTA_DENYLIST: ${{ secrets.SOTA_DENYLIST }}
        run: |
          if [ -z "${SOTA_DENYLIST}" ]; then
            echo "::error::SOTA_DENYLIST secret is empty on a trusted run — check 3 would degrade to generic-only. Restore the secret."
            exit 1
          fi
      - name: Check invariants
        # SOTA_DENYLIST (repository secret) carries the private internal-name
        # patterns for check 3; fork PRs don't receive it and fall back to the
        # generic checks — the authoritative scan runs on maintainer branches
        # and on push to main.
        env:
          SOTA_DENYLIST: ${{ secrets.SOTA_DENYLIST }}
        run: ./scripts/check-invariants.sh
      - name: Eval scoring tests
        # The scoring functions produce every number this project publishes. A
        # mutation probe on 2026-07-21 replaced score() with `return 1.0` and NOTHING
        # noticed — no test suite existed and CI never touched evals/. These golden
        # tests are mutation-resistant (each scorer checked at 1.0, 0.0 and a partial)
        # and were watched to fail against that exact mutation before being trusted.
        run: python3 evals/test_scoring.py

  shellcheck:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: shellcheck scripts/
        # shellcheck is preinstalled on ubuntu-latest runners.
        run: shellcheck -S warning scripts/*.sh

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Full history so gitleaks scans every commit, not just the checkout.
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          VERSION=8.30.0
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          SHA256=79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e
          curl -fsSL -o "$TARBALL" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}"
          echo "${SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xzf "$TARBALL" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan (full git history)
        run: gitleaks git --config .gitleaks.toml --redact --verbose .
